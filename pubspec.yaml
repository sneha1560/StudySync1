name: study_sync
description: StudySync - AI-Powered Study Planner with Pomodoro timer, analytics, and calendar integrations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State & Navigation
  provider: ^6.1.1
  go_router: ^13.0.0
  # Storage & Preferences
  shared_preferences: ^2.2.2
  # UI & Animations
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  # HTTP & Notion
  http: ^1.1.2
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
